version: "3.9"

# =============================================================================
# Ascendra Application Services — Development Override
#
# Extends docker-compose.yml to also run the application containers in dev mode
# with hot-reload via volume mounts.
#
# Usage (from project root):
#   docker compose \
#     -f infrastructure/docker-compose.yml \
#     -f infrastructure/docker-compose.dev.yml \
#     up --build
#
# In development, services run with DEBUG=true and the source directory is
# mounted so uvicorn --reload picks up code changes without rebuilding.
# =============================================================================

networks:
  ascendra-network:
    driver: bridge

x-service-common: &service-common
  restart: unless-stopped
  networks:
    - ascendra-network
  environment:
    DEBUG: "true"
    REDIS_URL: "redis://redis:6379"
    ALLOWED_ORIGINS: '["http://localhost:3000"]'

services:
  auth-service:
    <<: *service-common
    build:
      context: ../apps/services/auth-service
    container_name: ascendra-auth-service
    ports:
      - "8001:8000"
    volumes:
      - ../apps/services/auth-service:/app
    environment:
      <<: *service-common
      DATABASE_URL: "postgresql+asyncpg://ascendra:ascendra@postgres-auth:5432/auth_db"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy

  learning-service:
